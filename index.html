<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#9db5e5" id="themeColor" />
  <title>LM AUTO DEALS 🇬🇭🇺🇸 — Personal Car Shopper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <section class="hero hero-slideshow" id="heroSlideshow">
      <div class="hero-vignette" aria-hidden="true"></div>
      <div class="hero-brand" aria-hidden="true">
        <span class="hero-brand__lm">LM</span>
        <span class="hero-brand__name">AUTODEALS</span>
      </div>
      <div class="hero-slides">
        <div class="hero-slide active" data-tint="#0d1c3a" style="background-color:#9db5e5;background-image:url('images/homepage/IMG_2023 copy.PNG')">
          <span class="hero-name" aria-hidden="true">Rolls-Royce Ghost</span>
        </div>
        <div class="hero-slide" data-tint="#5a8a3a" style="background-color:#b1cf9e;background-image:url('images/homepage/IMG_2024 copy.PNG')">
          <span class="hero-name" aria-hidden="true">Lamborghini Huracán</span>
        </div>
        <div class="hero-slide" data-tint="#9ba3ae" style="background-color:#bbc3ce;background-image:url('images/homepage/IMG_2025 copy.PNG')">
          <span class="hero-name" aria-hidden="true">Porsche 911</span>
        </div>
        <div class="hero-slide" data-tint="#1a2d4a" style="background-color:#90a9ce;background-image:url('images/homepage/IMG_2026 copy.PNG')">
          <span class="hero-name" aria-hidden="true">BMW M8</span>
        </div>
        <div class="hero-slide" data-tint="#d8d8d6" style="background-color:#fffffd;background-image:url('images/homepage/IMG_2027 copy.PNG')">
          <span class="hero-name" aria-hidden="true">Range Rover</span>
        </div>
        
        <div class="hero-slide" data-tint="#6c7480" style="background-color:#9a9c9e;background-image:url('images/homepage/audi_grey.png')">
          <span class="hero-name" aria-hidden="true">Audi A6</span>
        </div>
        <div class="hero-slide" data-tint="#1f1f1f" style="background-color:#c2bfbf;background-image:url('images/homepage/g_wagon_black.png')">
          <span class="hero-name" aria-hidden="true">G-Wagon</span>
        </div>
      </div>
      <button class="hero-edge hero-edge--prev" type="button" aria-label="Previous car"></button>
      <button class="hero-edge hero-edge--next" type="button" aria-label="Next car"></button>
      <a href="showroom.html" class="showroom-btn">
        <img src="images/enter_showroom.PNG" alt="Enter Showroom">
      </a>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
