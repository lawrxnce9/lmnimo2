<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LM AUTO DEALS 🇬🇭🇺🇸 — Personal Car Shopper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="#" aria-label="LM AUTO DEALS"><img src="images/logo.png" alt="LM AUTO DEALS"></a>
    </div>
  </header>

  <main>
    <section class="hero hero-slideshow" id="heroSlideshow">
      <div class="hero-vignette" aria-hidden="true"></div>
      <div class="hero-slides">
        <div class="hero-slide active" data-tint="#6c7480" style="--name-color:rgba(48,55,66,0.55)">
          <span class="hero-name" aria-hidden="true">Audi A6</span>
          <img class="hero-car" src="images/homepage/audi_grey.png" alt="Audi A6">
        </div>
        <div class="hero-slide" data-tint="#1f1f1f" style="--name-color:rgba(22,22,22,0.5)">
          <span class="hero-name" aria-hidden="true">G-Wagon</span>
          <img class="hero-car" src="images/homepage/g_wagon_black.png" alt="Mercedes-Benz G-Class">
        </div>
        <div class="hero-slide" data-tint="#3d8f47" style="--name-color:rgba(32,82,40,0.55)">
          <span class="hero-name" aria-hidden="true">AMG GT</span>
          <img class="hero-car" src="images/homepage/mercedes_green.png" alt="Mercedes-AMG GT">
        </div>
      </div>
      <button class="hero-edge hero-edge--prev" type="button" aria-label="Previous car"></button>
      <button class="hero-edge hero-edge--next" type="button" aria-label="Next car"></button>
      <div class="hero-dots" role="tablist" aria-label="Featured cars">
        <button class="hero-dot active" type="button" data-index="0" aria-label="Show Audi A6"></button>
        <button class="hero-dot" type="button" data-index="1" aria-label="Show G-Wagon"></button>
        <button class="hero-dot" type="button" data-index="2" aria-label="Show AMG GT"></button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
